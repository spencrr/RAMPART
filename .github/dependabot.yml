version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "[MAINT]"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      security-minor-and-patch:
        applies-to: security-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "[MAINT]"
    groups:
      security-minor-and-patch:
        applies-to: security-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "[MAINT]"
    groups:
      security-minor-and-patch:
        applies-to: security-updates
        update-types:
          - minor
          - patch
