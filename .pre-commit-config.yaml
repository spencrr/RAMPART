repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: d1b833175a5d08a925900115526febd8fe71c98e # v0.15.11
  hooks:
    - id: ruff-check
      args: [ --fix ]
    - id: ruff-format
- repo: local
  hooks:
    - id: pyright
      name: pyright
      entry: uv run pyright
      language: system
      types: [python]
      pass_filenames: false
    - id: rampart-lint
      name: rampart-lint (RAMPART001, RAMPART002)
      entry: uv run python -m tools.rampart_lint check
      language: system
      types: [python]
      files: ^rampart/
      pass_filenames: true
